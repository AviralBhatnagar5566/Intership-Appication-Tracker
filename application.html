<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application submission</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body id="application">
    <div class="container">
        <h3>Application Submission Page</h3>
        <p>Fill out the details below to add a new job or internship to your tracker.</p>
        <form id="applicationForm">
            <label for="Companyname" style="font-weight: bold;">Company Name</label>
            <input type="text"  id="CompanyName" placeholder="Enter Company Name" >
            
            <label for="RolePosition" style="font-weight: bold;">Role/Position</label>
            <input type="text" id="roleposition" placeholder="Enter your Role or Position">
            
            <label for="date" style="font-weight: bold;">Application Date</label>
            <input type="date" id="date" >
            
            <label for="status" style="font-weight: bold;">Status</label>
            <select  id="status">
                <option value="Applied">Applied</option>
                <option value="Interview">Interview</option>
                <option value="Selected">Selected</option>
                <option value="Rejected">Rejected</option>
                <option value="Pending">Pending</option>
            </select>
            
            <label for="applicationlink" style="font-weight: bold;">Application Link</label>
            <input type="url" id="applicationlink">
            
            <label for="notes" style="font-weight: bold;">Notes</label>
            <textarea  id="notes"></textarea>
            
            <input type="submit" id="submit">
            <p id="sucessMsg" style="color: green;"></p>
        </form>
    </div>

</body>
</html>
