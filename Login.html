<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIN page</title>
    <link rel="stylesheet" href="CSS/auth.css">
</head>
<body>
    <div class="container">
        <h3>💼Internship Tracker</h3>
        <h1>Sign In</h1>
        <p>Welcome back! Sign in to continue tracking your internship applications.</p>
        <form id="RegistrationLoginForm">
            
            <label for="email" style="font-weight: bold;">E-mail</label>
            <input type="text" id="email" placeholder="Enter Email">
            <label for="password" style="font-weight: bold;">Password</label>
            <input type="password" id="password" placeholder="Enter Password">
            

            <button type="submit" id="createaccount">Sign In</button>
            <p id="successMsg" style="color: green;"></p>

        </form>
       
        <h3 id="or">──────────── or ────────────</h3>
        <h3>Don't have an account? <a href="register.html">Register</a></h3>


    </div>
</body>
</html>
