<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application submission</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body id="application">
    <div class="container">
        <h1>Application Update Page</h1>
        <p>Fill out the details below to add a new job or internship to your tracker.</p>
        <form id="applicationForm">
            <label for="Companyname" style="font-weight: bold;">Company Name</label>
            <input type="text"  id="CompanyName" placeholder="Enter Company Name" >
            <span class="error" id="CompanyNameerror"></span>
            
            <label for="RolePosition" style="font-weight: bold;">Role/Position</label>
            <input type="text" id="roleposition" placeholder="Enter your Role or Position">
            <span class="error" id="rolepositionerror"></span>

            
            <label for="date" style="font-weight: bold;">Application Date</label>
            <input type="date" id="date" >
            <span class="error" id="dateerror"></span>

            
            <label for="status" style="font-weight: bold;">Status</label>
            <select  id="status">
                <option value="Applied">Applied</option>
                <option value="Interview">Interview</option>
                <option value="Selected">Selected</option>
                <option value="Rejected">Rejected</option>
                <option value="Pending">Pending</option>
            </select>
            <span class="error" id="statuserror"></span>

            
            <label for="applicationlink" style="font-weight: bold;" >Application Link (Optional)</label>
            <input type="url" id="applicationlink"  placeholder="e.g., https://linkedin.com/...">
            <span class="error" id="applicationlinkerror"></span>

            
            <label for="notes" style="font-weight: bold;">Notes (Optional)</label>
            <textarea  id="notes" placeholder="Any extra details..."></textarea>
            <span class="error" id="noteserror"></span>

            
            <input type="submit" id="submit">
            <p id="successMsg" style="color: green;"></p>
        </form>
    </div>

</body>
<script src="JS/update.application.js"></script>
</html>
